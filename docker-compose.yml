services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cold_storage
      POSTGRES_USER: cold_storage
      POSTGRES_PASSWORD: cold_storage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  postgres_data:
